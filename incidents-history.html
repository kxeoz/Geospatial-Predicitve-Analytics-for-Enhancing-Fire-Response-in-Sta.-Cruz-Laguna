<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidents History - Fire Response System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        // Check for session before rendering
        if (!localStorage.getItem('bfp_admin_logged_in')) {
            window.location.href = '/login';
        }
    </script>
</head>
<body class="bg-gray-100">
    <!-- Header matching dashboard -->
    <header class="fire-theme shadow-lg sticky top-0 z-10" style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white;">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i data-feather="navigation" class="w-6 h-6 md:w-8 md:h-8"></i>
                <h1 class="text-lg md:text-xl font-bold">Fire Response Navigation</h1>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4">
                <nav class="flex space-x-4">
                    <a href="/?section=incidents" class="nav-btn">
                        <i data-feather="database" class="w-4 h-4 inline mr-1"></i> Incidents
                    </a>
                    <a href="incidents-history.html" class="nav-btn active">
                        <i data-feather="list" class="w-4 h-4 inline mr-1"></i> History
                    </a>
                    <a href="/dashboard.html?section=analysis" class="nav-btn">
                        <i data-feather="bar-chart-2" class="w-4 h-4 inline mr-1"></i> Analysis
                    </a>
                    <a href="/dashboard.html?section=contacts" class="nav-btn">
                        <i data-feather="phone" class="w-4 h-4 inline mr-1"></i> Contacts
                    </a>
                </nav>
                <div id="current-time" class="text-right leading-tight text-white"></div>
                <button onclick="logout()" class="p-2 bg-red-900/50 hover:bg-red-950 rounded-lg text-white transition-colors" title="Logout">
                    <i data-feather="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-gray-800">
                    <i data-feather="file-text" class="w-8 h-8 inline-block mr-2"></i>
                    Incidents History
                </h1>
            </div>

            <div class="mb-4 flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-4">
                <div class="flex-grow">
                    <input type="text" id="searchIncident" placeholder="Search incidents..." 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="w-full md:w-64">
                    <select id="barangayFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Barangays (Santa Cruz)</option>
                        <option value="Alipit">Alipit</option>
                        <option value="Bagumbayan">Bagumbayan</option>
                        <option value="Bubukal">Bubukal</option>
                        <option value="Calios">Calios</option>
                        <option value="Duhat">Duhat</option>
                        <option value="Gatid">Gatid</option>
                        <option value="Jasaan">Jasaan</option>
                        <option value="Labuin">Labuin</option>
                        <option value="Malinao">Malinao</option>
                        <option value="Oogong">Oogong</option>
                        <option value="Pagsawitan">Pagsawitan</option>
                        <option value="Palasan">Palasan</option>
                        <option value="Patimbao">Patimbao</option>
                        <option value="Poblacion I">Poblacion I</option>
                        <option value="Poblacion II">Poblacion II</option>
                        <option value="Poblacion III">Poblacion III</option>
                        <option value="Poblacion IV">Poblacion IV</option>
                        <option value="Poblacion V">Poblacion V</option>
                        <option value="San Jose">San Jose</option>
                        <option value="San Juan">San Juan</option>
                        <option value="San Pablo Norte">San Pablo Norte</option>
                        <option value="San Pablo Sur">San Pablo Sur</option>
                        <option value="Santo Angel Central">Santo Angel Central</option>
                        <option value="Santo Angel Norte">Santo Angel Norte</option>
                        <option value="Santo Angel Sur">Santo Angel Sur</option>
                        <option value="Santisima Cruz">Santisima Cruz</option>
                    </select>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full bg-white border border-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Location</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Occupancy</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Response Time</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="incidentsTableBody">
                        <tr>
                            <td colspan="6" class="px-4 py-8 text-center text-gray-500">
                                <i data-feather="loader" class="w-8 h-8 inline-block animate-spin"></i>
                                <p class="mt-2">Loading incidents...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="pagination" class="mt-6 flex justify-center space-x-2"></div>
        </div>
    </div>

    <script>
        let allIncidents = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // Load incidents from backend
        async function loadIncidents() {
            try {
                const response = await fetch('http://localhost:5000/api/incidents');
                if (!response.ok) throw new Error('Failed to load incidents');
                
                const data = await response.json();
                allIncidents = data.incidents || [];
                displayIncidents();
            } catch (error) {
                console.error('Error loading incidents:', error);
                document.getElementById('incidentsTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-red-500">
                            <i data-feather="alert-circle" class="w-8 h-8 inline-block"></i>
                            <p class="mt-2">Failed to load incidents. Make sure backend is running.</p>
                        </td>
                    </tr>
                `;
                feather.replace();
            }
        }

        async function deleteIncident(id) {
            if (!confirm(`Are you sure you want to delete incident #${id}? This cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:5000/api/incidents/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Show brief success message and reload
                    allIncidents = allIncidents.filter(inc => inc.id !== id);
                    displayIncidents();
                    // Optional: alert('Incident deleted successfully');
                } else {
                    const error = await response.json();
                    alert(`Failed to delete incident: ${error.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Error deleting incident:', error);
                alert('Failed to delete incident. Please check if the backend is running.');
            }
        }

        function displayIncidents() {
            const tbody = document.getElementById('incidentsTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedIncidents = allIncidents.slice(start, end);

            if (paginatedIncidents.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-gray-500">
                            No incidents found
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = paginatedIncidents.map(incident => {
                // Parse date properly from multiple possible fields
                let dateStr = 'N/A';
                const dateValue = incident.date || incident.date_of_incident || incident.time_received;
                
                if (dateValue) {
                    // If it's already a clean string like MM/DD/YYYY, keep it
                    if (typeof dateValue === 'string' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateValue)) {
                        dateStr = dateValue;
                    } else {
                        try {
                            const date = new Date(dateValue);
                            if (!isNaN(date.getTime())) {
                                dateStr = date.toLocaleDateString();
                            }
                        } catch (e) {
                            dateStr = dateValue;
                        }
                    }
                }
                
                return `
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm">${incident.id || 'N/A'}</td>
                        <td class="px-4 py-3 text-sm">${dateStr}</td>
                        <td class="px-4 py-3 text-sm">${incident.location || 'N/A'}</td>
                        <td class="px-4 py-3 text-sm">
                            <span class="px-2 py-1 bg-orange-100 text-orange-800 rounded-full text-xs">
                                ${incident.type || incident.fire_type || 'N/A'}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-sm">${incident.response_time || incident.response_time_min || 0} min</td>
                        <td class="px-4 py-3 text-sm flex space-x-2">
                            <a href="feedback-detail.html?id=${incident.id}" 
                               class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs flex items-center">
                                <i data-feather="eye" class="w-3 h-3 mr-1"></i>
                                View Feedback
                            </a>
                            <button onclick="deleteIncident(${incident.id})" 
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs flex items-center">
                                <i data-feather="trash-2" class="w-3 h-3 mr-1"></i>
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            feather.replace();
            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(allIncidents.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            
            // Previous button
            html += `
                <button onclick="goToPage(${currentPage - 1})" 
                        ${currentPage === 1 ? 'disabled' : ''}
                        class="px-4 py-2 rounded ${currentPage === 1 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-200 hover:bg-gray-300'}">
                    Previous
                </button>
            `;
            
            // Page numbers (show max 7 buttons)
            let startPage = Math.max(1, currentPage - 3);
            let endPage = Math.min(totalPages, currentPage + 3);
            
            // First page
            if (startPage > 1) {
                html += `<button onclick="goToPage(1)" class="px-4 py-2 rounded bg-gray-200 hover:bg-gray-300">1</button>`;
                if (startPage > 2) {
                    html += `<span class="px-2 py-2">...</span>`;
                }
            }
            
            // Middle pages
            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <button onclick="goToPage(${i})" 
                            class="px-4 py-2 rounded ${i === currentPage ? 'bg-blue-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}">
                        ${i}
                    </button>
                `;
            }
            
            // Last page
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += `<span class="px-2 py-2">...</span>`;
                }
                html += `<button onclick="goToPage(${totalPages})" class="px-4 py-2 rounded bg-gray-200 hover:bg-gray-300">${totalPages}</button>`;
            }
            
            // Next button
            html += `
                <button onclick="goToPage(${currentPage + 1})" 
                        ${currentPage === totalPages ? 'disabled' : ''}
                        class="px-4 py-2 rounded ${currentPage === totalPages ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-200 hover:bg-gray-300'}">
                    Next
                </button>
            `;
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(allIncidents.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            displayIncidents();
        }

        // Search functionality
        document.getElementById('searchIncident').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allIncidents.filter(incident => 
                JSON.stringify(incident).toLowerCase().includes(searchTerm)
            );
            
            const tbody = document.getElementById('incidentsTableBody');
            tbody.innerHTML = filtered.map(incident => {
                // Parse date properly from multiple possible fields
                let dateStr = 'N/A';
                const dateValue = incident.date || incident.date_of_incident || incident.time_received;
                
                if (dateValue) {
                    // If it's already a clean string like MM/DD/YYYY, keep it
                    if (typeof dateValue === 'string' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateValue)) {
                        dateStr = dateValue;
                    } else {
                        try {
                            const date = new Date(dateValue);
                            if (!isNaN(date.getTime())) {
                                dateStr = date.toLocaleDateString();
                            }
                        } catch (e) {
                            dateStr = dateValue;
                        }
                    }
                }
                
                return `
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm">${incident.id || 'N/A'}</td>
                        <td class="px-4 py-3 text-sm">${dateStr}</td>
                        <td class="px-4 py-3 text-sm">${incident.location || 'N/A'}</td>
                        <td class="px-4 py-3 text-sm">
                            <span class="px-2 py-1 bg-orange-100 text-orange-800 rounded-full text-xs">
                                ${incident.type || incident.fire_type || 'N/A'}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-sm">${incident.response_time || incident.response_time_min || 0} min</td>
                        <td class="px-4 py-3 text-sm flex space-x-2">
                            <a href="feedback-detail.html?id=${incident.id}" 
                               class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs flex items-center">
                                <i data-feather="eye" class="w-3 h-3 mr-1"></i>
                                View Feedback
                            </a>
                            <button onclick="deleteIncident(${incident.id})" 
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs flex items-center">
                                <i data-feather="trash-2" class="w-3 h-3 mr-1"></i>
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            feather.replace();
        });

        // Initialize
        function updateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const dateStr = now.toLocaleDateString('en-US', dateOptions);
            const timeStr = now.toLocaleTimeString('en-US', timeOptions);
            const timeElement = document.getElementById('current-time');
            if (timeElement) {
                timeElement.innerHTML = `<div class="text-xs opacity-90">${dateStr}</div><div class="font-bold">${timeStr}</div>`;
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        function logout() {
            localStorage.removeItem('bfp_admin_logged_in');
            localStorage.removeItem('bfp_admin_user');
            window.location.href = '/login';
        }

        feather.replace();
        loadIncidents();
    </script>
</body>
</html>
